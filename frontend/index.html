<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tracker - Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">📚 Book Tracker</h1>
            <div class="nav-links">
                <a href="index.html" class="active">Library</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="header">
            <h1>My Library</h1>
            <button class="btn btn-primary" onclick="showAddBookModal()">+ Add New Book</button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search books..." onkeyup="filterBooks()">
            <select id="statusFilter" onchange="filterBooks()">
                <option value="">All Status</option>
                <option value="To Read">To Read</option>
                <option value="Reading">Reading</option>
                <option value="Completed">Completed</option>
                <option value="On Hold">On Hold</option>
            </select>
        </div>

        <!-- Books Grid -->
        <div class="books-grid" id="booksGrid">
            <!-- Books will be loaded here -->
        </div>
    </main>

    <!-- Add/Edit Book Modal -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Book</h2>
            <form id="bookForm" onsubmit="saveBook(event)">
                <input type="hidden" id="bookId">
                
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required>
                </div>
                
                <div class="form-group">
                    <label for="author">Author *</label>
                    <input type="text" id="author" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="isbn">ISBN</label>
                        <input type="text" id="isbn">
                    </div>
                    
                    <div class="form-group">
                        <label for="genre">Genre</label>
                        <input type="text" id="genre">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="publication_year">Year</label>
                        <input type="number" id="publication_year">
                    </div>
                    
                    <div class="form-group">
                        <label for="pages">Total Pages</label>
                        <input type="number" id="pages">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="To Read">To Read</option>
                        <option value="Reading">Reading</option>
                        <option value="Completed">Completed</option>
                        <option value="On Hold">On Hold</option>
                        <option value="Dropped">Dropped</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Save Book</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reading Session Modal -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSessionModal()">&times;</span>
            <h2>Add Reading Session</h2>
            <form id="sessionForm" onsubmit="saveReadingSession(event)">
                <input type="hidden" id="sessionBookId">
                
                <div class="form-group">
                    <label for="sessionDate">Date</label>
                    <input type="date" id="sessionDate" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="pagesRead">Pages Read</label>
                        <input type="number" id="pagesRead" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="minutesRead">Minutes Read</label>
                        <input type="number" id="minutesRead" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="sessionNotes">Notes</label>
                    <textarea id="sessionNotes" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Add Session</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
